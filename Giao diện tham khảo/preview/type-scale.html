<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .row-l { display: grid; grid-template-columns: 110px 80px 60px 1fr; gap: 12px; align-items: baseline; padding: 4px 0; }
  .row-l + .row-l { border-top: 1px dashed var(--outline-variant); padding-top: 8px; }
  .tag { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); font-weight: 600; }
  .spec { font-family: var(--font-display); color: var(--fg-1); }
</style></head>
<body><div class="card">
  <div class="label-tag">Type scale ladder</div>
  <div class="row-l"><span class="tag">display-lg</span><span class="tag">57 / 64</span><span class="tag">700</span><span class="spec" style="font-size:32px;line-height:1">Aa Bb</span></div>
  <div class="row-l"><span class="tag">display-md</span><span class="tag">45 / 52</span><span class="tag">700</span><span class="spec" style="font-size:28px;line-height:1">Aa Bb</span></div>
  <div class="row-l"><span class="tag">display-sm</span><span class="tag">36 / 44</span><span class="tag">600</span><span class="spec" style="font-size:24px;line-height:1">Aa Bb</span></div>
  <div class="row-l"><span class="tag">headline-lg</span><span class="tag">32 / 40</span><span class="tag">700</span><span class="spec" style="font-size:22px;line-height:1">Aa Bb</span></div>
  <div class="row-l"><span class="tag">title-lg</span><span class="tag">22 / 28</span><span class="tag">600</span><span class="spec" style="font-size:18px;line-height:1;font-family:var(--font-body)">Aa Bb</span></div>
  <div class="row-l"><span class="tag">body-lg</span><span class="tag">16 / 24</span><span class="tag">400</span><span class="spec" style="font-size:14px;line-height:1;font-family:var(--font-body);font-weight:400">Aa Bb đặc biệt</span></div>
  <div class="row-l"><span class="tag">label-md</span><span class="tag">12 / 16</span><span class="tag">600</span><span class="spec" style="font-size:11px;line-height:1;font-family:var(--font-body);letter-spacing:.04em">AA BB</span></div>
</div></body></html>
