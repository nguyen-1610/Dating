<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="label-tag">Semantic · status + accent</div>
  <div class="row">
    <div class="swatch" style="background:var(--success);color:#fff"><span class="name">Success</span><span class="hex">#10B981</span></div>
    <div class="swatch" style="background:var(--success-container);color:#065f46"><span class="name">Success / ctr</span><span class="hex">#D1FAE5</span></div>
    <div class="swatch" style="background:var(--warning);color:#fff"><span class="name">Warning</span><span class="hex">#F59E0B</span></div>
    <div class="swatch" style="background:var(--warning-container);color:#7c2d12"><span class="name">Warning / ctr</span><span class="hex">#FEF3C7</span></div>
  </div>
  <div class="row">
    <div class="swatch" style="background:var(--error);color:#fff"><span class="name">Error</span><span class="hex">#EF4444</span></div>
    <div class="swatch" style="background:var(--error-container);color:#7f1d1d"><span class="name">Error / ctr</span><span class="hex">#FEE2E2</span></div>
    <div class="swatch" style="background:var(--superlike);color:#003a4a"><span class="name">Super-like</span><span class="hex">#00C8FF</span></div>
    <div class="swatch" style="background:var(--superlike-container);color:#003a4a"><span class="name">Super-like / ctr</span><span class="hex">#CDF3FF</span></div>
  </div>
  <div class="note">Super-like sits outside the M3 token tree on purpose — it's a brand-owned accent for the third swipe action.</div>
</div></body></html>
