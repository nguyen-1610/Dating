<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Symbols+Rounded">
<style>
  body { background: var(--neutral-96); }
  .nav-host {
    display: flex; justify-content: center;
    padding: 24px;
  }
  .nav {
    width: 390px;
    background: #fff;
    border-radius: 28px;
    box-shadow: var(--elev-4);
    padding: 12px 8px 14px;
    display: flex; justify-content: space-around;
  }
  .item {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;
    padding: 6px 4px;
    text-decoration: none;
  }
  .item .pill {
    width: 56px; height: 32px;
    border-radius: 999px;
    display: flex; align-items: center; justify-content: center;
    transition: background .2s var(--ease-standard);
  }
  .item .icon {
    font-family: 'Material Symbols Rounded';
    font-size: 24px; color: var(--fg-2);
    font-variation-settings: 'FILL' 0, 'wght' 500;
  }
  .item .lbl {
    font-family: var(--font-body); font-size: 11px; font-weight: 600;
    color: var(--fg-2); letter-spacing: 0.02em;
  }
  .item.active .pill { background: var(--primary-container); }
  .item.active .icon { color: var(--primary); font-variation-settings: 'FILL' 1, 'wght' 500; }
  .item.active .lbl { color: var(--fg-1); }
  .badge-dot {
    position: relative;
  }
  .badge-dot::after {
    content: ""; position: absolute;
    top: 2px; right: 14px;
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--love-60); border: 2px solid #fff;
  }
</style></head>
<body><div class="nav-host">
  <nav class="nav">
    <a class="item active"><div class="pill"><span class="icon">whatshot</span></div><span class="lbl">Khám phá</span></a>
    <a class="item badge-dot"><div class="pill"><span class="icon">favorite</span></div><span class="lbl">Match</span></a>
    <a class="item"><div class="pill"><span class="icon">dynamic_feed</span></div><span class="lbl">Feed</span></a>
    <a class="item"><div class="pill"><span class="icon">event</span></div><span class="lbl">Sự kiện</span></a>
    <a class="item"><div class="pill"><span class="icon">person</span></div><span class="lbl">Hồ sơ</span></a>
  </nav>
</div></body></html>
