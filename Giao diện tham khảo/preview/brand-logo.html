<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 0; }
  .brand {
    display: flex; align-items: center; gap: 20px;
    padding: 28px 32px;
    background: linear-gradient(135deg, #d6336c 0%, #8b5cf6 65%, #3b82f6 100%);
    color: #fff;
  }
  .brand img { width: 88px; height: 88px; filter: drop-shadow(0 6px 16px rgba(0,0,0,.18)); }
  .brand .wordmark {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 52px;
    letter-spacing: -0.03em;
    line-height: 1;
  }
  .brand .tag {
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 500;
    opacity: .92;
    margin-top: 6px;
    letter-spacing: 0.01em;
  }
</style></head>
<body>
  <div class="brand">
    <img src="../assets/logo-mark.svg" alt="">
    <div>
      <div class="wordmark">UniDate</div>
      <div class="tag">Yêu ở giảng đường · Find your campus crush</div>
    </div>
  </div>
</body></html>
