<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .row-r { display: grid; grid-template-columns: repeat(7, 1fr); gap: 12px; }
  .chip {
    aspect-ratio: 1 / 1;
    background: var(--love-95);
    border: 1.5px solid var(--love-60);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 4px;
  }
  .chip .num { font-family: var(--font-mono); font-size: 11px; color: var(--love-30); font-weight: 700; }
  .chip .tok { font-family: var(--font-mono); font-size: 9px; color: var(--love-40); font-weight: 600; opacity: .7; }
</style></head>
<body><div class="card">
  <div class="label-tag">Radii · M3 shape scale</div>
  <div class="row-r">
    <div class="chip" style="border-radius:4px"><span class="num">4</span><span class="tok">xs</span></div>
    <div class="chip" style="border-radius:8px"><span class="num">8</span><span class="tok">sm</span></div>
    <div class="chip" style="border-radius:12px"><span class="num">12</span><span class="tok">md</span></div>
    <div class="chip" style="border-radius:16px"><span class="num">16</span><span class="tok">lg</span></div>
    <div class="chip" style="border-radius:24px"><span class="num">24</span><span class="tok">xl</span></div>
    <div class="chip" style="border-radius:28px"><span class="num">28</span><span class="tok">2xl</span></div>
    <div class="chip" style="border-radius:999px"><span class="num">∞</span><span class="tok">pill</span></div>
  </div>
  <div class="note">Profile cards: 28 (2xl). Buttons: pill. Inputs: 16. Chips: pill. Sheets: 28 top corners.</div>
</div></body></html>
