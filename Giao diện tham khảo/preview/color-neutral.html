<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="label-tag">Neutral · slate-leaning grays</div>
  <div class="row">
    <div class="swatch" style="background:var(--neutral-5);color:#fff"><span class="name">5</span><span class="hex">#0A0A0F</span></div>
    <div class="swatch" style="background:var(--neutral-15);color:#fff"><span class="name">15</span><span class="hex">#1D1D24</span></div>
    <div class="swatch" style="background:var(--neutral-25);color:#fff"><span class="name">25</span><span class="hex">#2F2F39</span></div>
    <div class="swatch" style="background:var(--neutral-40);color:#fff"><span class="name">40</span><span class="hex">#525261</span></div>
    <div class="swatch" style="background:var(--neutral-60);color:#fff"><span class="name">60</span><span class="hex">#878798</span></div>
    <div class="swatch" style="background:var(--neutral-80);color:#1d1d24"><span class="name">80</span><span class="hex">#C5C5CF</span></div>
    <div class="swatch" style="background:var(--neutral-90);color:#1d1d24"><span class="name">90</span><span class="hex">#E5E5EC</span></div>
    <div class="swatch" style="background:var(--neutral-96);color:#1d1d24"><span class="name">96</span><span class="hex">#F4F4F7</span></div>
    <div class="swatch" style="background:var(--neutral-100);color:#1d1d24;border:1px solid var(--outline-variant)"><span class="name">100</span><span class="hex">#FFFFFF</span></div>
  </div>
  <div class="note">Backgrounds and text. Avoid pure black (use 5–15) and pure white only on top surfaces.</div>
</div></body></html>
